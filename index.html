            // Replace each placeholder with the actual Google Drive file ID for that image.
            // Example: 'img/logo/paskaness.png': '1a2b3c4d5e6f7g8h9i0j',
        };

        const getDriveUrlFromLink = (url) => {
            if (!url || typeof url !== 'string') return '';
            const match = url.match(/(?:drive\.google\.com\/file\/d\/|drive\.google\.com\/open\?id=|drive\.google\.com\/uc\?id=)([a-zA-Z0-9_-]+)/);
            if (match && match[1]) {
                return `${DRIVE_IMAGE_URL_BASE}${match[1]}`;
            }
            return url;
        };

        const getImageUrl = (data) => {
            if (!data) return '';
            if (typeof data === 'object') {
                if (data.imageUrl) return getDriveUrlFromLink(data.imageUrl);
                if (data.image) return data.image;
            }
            if (typeof data === 'string') {
                return data.startsWith('http') ? getDriveUrlFromLink(data) : data;
            }
            return '';
        };

        const normalizeImageSources = () => {
            const normalize = (item) => {
                if (!item || typeof item !== 'object') return;
                if (item.image) item.image = getImageUrl(item.image);
                if (item.logoImage) item.logoImage = getImageUrl(item.logoImage);
                if (item.documentation && Array.isArray(item.documentation)) {

                            />
                            <RoleSection 
                                title={WEBSITE_CONTENT.structure.categories.litbang} 
                                members={grouped.litbang} 
                                colorClass="text-primary" 
                            />
                            <RoleSection 
                                title={WEBSITE_CONTENT.structure.categories.tekpram} 
                                members={grouped.tekpram} 
                                colorClass="text-primary" 
                            />
                            <RoleSection 
                                title={WEBSITE_CONTENT.structure.categories.pemateri} 
                                members={grouped.pemateri} 
                                colorClass="text-primary" 
                            />
                            {grouped.departemen.length > 0 && (
                                <div className="mb-24">
                                    <h3 className="text-2xl font-bold mb-10 flex items-center gap-3"><span className="w-12 h-[2px] bg-primary"></span>{WEBSITE_CONTENT.structure.categories.departemen}</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                        {grouped.departemen.map(member => <MemberCard key={member.id} member={member} colorClass={member.role.includes('Bakat') ? "text-tertiary" : "text-primary"} />)}
                                    </div>
                                </div>
                            )}
                        </>
                    )}
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('home');

            useEffect(() => {
                // Load saved logo from localStorage
                const savedLogo = localStorage.getItem('paskanessLogoImage');
                if (savedLogo) {
                    window.currentLogoImage = savedLogo;
                }
                document.title = `${WEBSITE_CONFIG.brandName} - Jejak Karya & Arsip`;
            }, []);

            useEffect(() => {
                window.scrollTo(0, 0);
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab]);

            // Global functions for logo management
            window.handleLogoChange = (event) => {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        window.currentLogoImage = e.target.result;
                        localStorage.setItem('paskanessLogoImage', window.currentLogoImage);
                        // Refresh icons
                        if (window.lucide) window.lucide.createIcons();
                    };
                    reader.readAsDataURL(file);
                }
            };

            window.resetLogo = () => {
                window.currentLogoImage = null;
                localStorage.removeItem('paskanessLogoImage');
                document.getElementById('logo-file-input').value = '';
                if (window.lucide) window.lucide.createIcons();
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <Navbar activeTab={activeTab} setActiveTab={setActiveTab} />
                    <main className="flex-grow">
                        {activeTab === 'home' && <HomePage onNavigate={setActiveTab} />}
                        {activeTab === 'archive' && <ArchivePage />}
                        {activeTab === 'structure' && <StructurePage />}
                    </main>
                    <Footer />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
